[remote.github]
owner = "hebertpaziam"
repo = "skills"

[changelog]
header = """
# Changelog

This file is generated automatically from the Conventional Commits history.
Do not edit manually.

"""
body = """
{% if version -%}
## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## Unreleased
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{% if commit.breaking %}[breaking] {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}

"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
protect_breaking_commits = true
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "newest"
commit_parsers = [
  { message = "^chore\\(changelog\\):", skip = true },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs?", group = "Documentation" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^perf", group = "Performance" },
  { message = "^test", group = "Tests" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI" },
  { message = "^style", group = "Style" },
  { message = "^chore", group = "Maintenance" },
  { message = "^revert", group = "Reverts" },
]
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/hebertpaziam/skills/issues/$1" },
]
